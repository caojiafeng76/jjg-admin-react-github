model = "gpt-5.6-sol"
model_context_window = 372000
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
[mcp_servers.spec-workflow]
args = [
    "--no-install",
    "spec-workflow-mcp",
    ".",
]
command = "npx"

[mcp_servers.supabase]
args = [
    "-y",
    "@supabase/mcp-server-supabase",
    "--project-ref",
    "mlcptrkvkseyqxxlfcme",
]
command = "npx"
env_vars = ["SUPABASE_ACCESS_TOKEN"]

[mcp_servers.serena]
url = "http://127.0.0.1:9121/mcp"
startup_timeout_sec = 20

[mcp_servers.context7]
args = [
    "-y",
    "@upstash/context7-mcp@latest",
]
command = "npx"

[mcp_servers.chrome-devtools]
args = [
    "-y",
    "chrome-devtools-mcp@latest",
]
command = "npx"

# Managed by LazyCodex: multi_agent_v2 is re-disabled on every Codex session start
# because enabling it fails every turn with HTTP 400 (openai/codex#26753).
# Opt out: LAZYCODEX_CONFIG_MIGRATION_DISABLED=1 (or OMO_CODEX_CONFIG_MIGRATION_DISABLED=1).
[features.multi_agent_v2]
max_concurrent_threads_per_session = 16
enabled = false

[agents]
max_threads = 1000
