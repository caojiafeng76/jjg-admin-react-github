name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # 占位环境变量：仅用于让依赖 env 校验的模块在 CI 中可加载，
  # 不是真实凭据（真实 anon key 本身也是公开的，但 CI 不需要连接数据库）
  VITE_REACT_APP_SUPABASE_URL: https://ci-placeholder.supabase.co
  VITE_REACT_APP_SUPABASE_KEY: ci-placeholder-key-0000000000000000000000000000000000000000

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check Edge Functions
        run: deno check supabase/functions/*/index.ts

      - name: Audit production dependencies
        run: bun audit --production

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

      - name: Build
        run: bun run build

      - name: Check bundle budget
        run: bun run check:bundle

      - name: Ant Design lint
        run: bunx antd lint
